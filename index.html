<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>回收報價系統V4</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>♻️ 回收報價智慧系統 V4（實戰版）</h1>

<div class="box">

<h2>📦 輸入資料</h2>

品項：
<select id="item"></select><br><br>

上游價格：
<input id="price" type="number"><br><br>

重量（kg）：
<input id="weight" type="number"><br><br>

競爭狀態：
<select id="level">
<option value="low">低（穩定貨源）</option>
<option value="mid">中（一般市場）</option>
<option value="high">高（有人搶貨）</option>
</select><br><br>

<button onclick="analyze()">分析報價</button>

</div>

<hr>

<div class="box">

<h2>📊 分析結果</h2>

<div id="result">請輸入資料</div>

</div>

<script src="script.js"></script>
</body>
</html>
