<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>回收營運系統V5</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>♻️ 回收營運系統 V5（紀錄版）</h1>

<div class="box">

<h2>📦 報價分析</h2>

品項：
<select id="item"></select><br><br>

上游價格：
<input id="price" type="number"><br><br>

重量（kg）：
<input id="weight" type="number"><br><br>

競爭：
<select id="level">
<option value="low">低</option>
<option value="mid">中</option>
<option value="high">高</option>
</select><br><br>

<button onclick="analyze()">分析 + 存紀錄</button>

</div>

<hr>

<div class="box">

<h2>📊 分析結果</h2>
<div id="result">尚未分析</div>

</div>

<hr>

<div class="box">

<h2>🧾 今日紀錄</h2>
<div id="log"></div>

<h3 id="summary"></h3>

</div>

<script src="script.js"></script>
</body>
</html>
